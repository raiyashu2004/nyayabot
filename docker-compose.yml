version: "3.9"

services:

  # ── PostgreSQL with pgvector ──────────────────────────
  db:
    image: pgvector/pgvector:pg16
    container_name: juris_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: juris
      POSTGRES_PASSWORD: juris_secret
      POSTGRES_DB: juris
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U juris -d juris"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (caching + Celery broker) ──────────────────
  redis:
    image: redis:7-alpine
    container_name: juris_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  # ── FastAPI Backend ────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: juris_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://juris:juris_secret@db:5432/juris
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - document_storage:/app/uploads

  # ── React Frontend ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: juris_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000

  # ── Celery worker (background document analysis) ───────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: juris_worker
    command: celery -A utils.celery_app worker --loglevel=info --concurrency=2
    restart: unless-stopped
    depends_on:
      - db
      - redis
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://juris:juris_secret@db:5432/juris
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
      - document_storage:/app/uploads

volumes:
  pgdata:
  document_storage:
